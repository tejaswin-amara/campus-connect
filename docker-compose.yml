version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: campus_events_db
    environment:
      MYSQL_DATABASE: campus_events
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: campus_events_app
    ports:
      - "9090:9090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/campus_events?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - UPLOAD_DIR=/app/uploads
      - ADMIN_PASSWORD=admin
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads

volumes:
  db_data:
  app_uploads:
